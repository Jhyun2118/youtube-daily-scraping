name: Daily YouTube Scrape

on:
  schedule:
    # 01:00 UTC = 10:00 KST (매일)
    - cron: '0 1 * * *'
  workflow_dispatch:

# 동시에 1개 run만 허용. 이미 돌고 있으면 새 trigger는 queue됨.
concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      DB_DIR: /home/runner/youtube_daily_db
      DB_FILE: youtube_daily.db
      B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      B2_BUCKET: ${{ secrets.B2_BUCKET_NAME }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_DB_DIR: /home/runner/youtube_daily_db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt

      - name: Debug environment
        run: |
          echo "Python: $(python3 --version)"
          echo "b2sdk version:"
          python3 -c "import b2sdk; print(b2sdk.__version__)"
          echo "Secrets check (lengths, not values):"
          echo "  B2_KEY_ID length: ${#B2_KEY_ID}"
          echo "  B2_APPLICATION_KEY length: ${#B2_APPLICATION_KEY}"
          echo "  B2_BUCKET: '$B2_BUCKET'"
          echo "  YOUTUBE_API_KEY length: ${#YOUTUBE_API_KEY}"

      - name: Download DB from B2
        run: |
          mkdir -p "$DB_DIR"
          python3 - <<'EOF'
          import os, sys
          from b2sdk.v2 import InMemoryAccountInfo, B2Api

          info = InMemoryAccountInfo()
          api = B2Api(info)
          api.authorize_account("production", os.environ["B2_KEY_ID"], os.environ["B2_APPLICATION_KEY"])
          print(f"Authorized. Account ID: {info.get_account_id()}")

          bucket_name = os.environ["B2_BUCKET"]
          db_file = os.environ["DB_FILE"]
          db_dir = os.environ["DB_DIR"]
          local_path = os.path.join(db_dir, db_file)

          bucket = api.get_bucket_by_name(bucket_name)
          print(f"Got bucket: {bucket_name}")

          # Check if file exists
          found = None
          for file_info, _ in bucket.ls():
              if file_info.file_name == db_file:
                  found = file_info
                  break
          if not found:
              print(f"::error::File '{db_file}' not found in bucket '{bucket_name}'")
              print(f"Available files: {[fi.file_name for fi, _ in bucket.ls()][:10]}")
              sys.exit(1)
          print(f"Found file: {db_file} ({found.size/1024/1024:.1f} MB)")

          dl = bucket.download_file_by_name(db_file)
          dl.save_to(local_path)
          size = os.path.getsize(local_path)
          print(f"Downloaded to {local_path} ({size/1024/1024:.1f} MB)")
          EOF

      - name: Run daily scrape
        run: |
          cd scraper
          python3 scrape_daily.py
        continue-on-error: true

      - name: Upload DB to B2
        if: always()
        run: |
          python3 - <<'EOF'
          import os, sys
          from b2sdk.v2 import InMemoryAccountInfo, B2Api

          info = InMemoryAccountInfo()
          api = B2Api(info)
          api.authorize_account("production", os.environ["B2_KEY_ID"], os.environ["B2_APPLICATION_KEY"])
          bucket = api.get_bucket_by_name(os.environ["B2_BUCKET"])

          local_path = os.path.join(os.environ["DB_DIR"], os.environ["DB_FILE"])
          if not os.path.exists(local_path):
              print(f"::error::No local DB at {local_path}")
              sys.exit(1)
          size = os.path.getsize(local_path)
          print(f"Uploading {local_path} ({size/1024/1024:.1f} MB)...")

          bucket.upload_local_file(
              local_file=local_path,
              file_name=os.environ["DB_FILE"],
          )
          print(f"Uploaded.")
          EOF

      - name: Show scrape log
        if: always()
        run: |
          tail -50 scraper/logs/scrape_*.log 2>/dev/null || echo "no log"

      - name: Show DB stats
        if: always()
        run: |
          python3 -c "
          import sqlite3, os
          db = os.path.join('$DB_DIR', '$DB_FILE')
          if not os.path.exists(db):
              print('no DB'); exit(0)
          c = sqlite3.connect(db)
          print('=== scrape_log (last 3) ===')
          for r in c.execute('SELECT run_id, scrape_date, status, n_channels_done, n_videos_updated, n_new_videos, n_embed_changes, quota_units_used FROM scrape_log ORDER BY run_id DESC LIMIT 3'):
              print(r)
          print('=== today panel ===')
          for t in ['channels_daily', 'videos_daily', 'embeds_daily']:
              n = c.execute(f\"SELECT COUNT(*) FROM {t} WHERE scrape_date = date('now')\").fetchone()[0]
              print(f'  {t}: {n}')
          "

      - name: Prepare email summary
        if: always()
        id: email_content
        run: |
          python3 - <<'PYEOF'
          import sqlite3, os
          db = os.path.join(os.environ["DB_DIR"], os.environ["DB_FILE"])
          run_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"

          if not os.path.exists(db):
              subject = "❌ Daily YouTube scrape — DB MISSING"
              body = f"DB file not found.\n\nRun: {run_url}"
          else:
              c = sqlite3.connect(db)
              r = c.execute("""
                  SELECT scrape_date, started_at_utc, ended_at_utc, status,
                         n_channels_done, n_channels_failed, n_videos_updated,
                         n_new_videos, n_embeds_reparsed, n_embed_changes,
                         quota_units_used, notes
                  FROM scrape_log ORDER BY run_id DESC LIMIT 1
              """).fetchone()
              if not r:
                  subject = "⚠️ Daily YouTube scrape — NO SCRAPE LOG"
                  body = f"scrape_log empty.\n\nRun: {run_url}"
              else:
                  date, started, ended, status, n_ch, n_ch_fail, n_vid, n_new, n_emb_re, n_emb_chg, quota, notes = r
                  icon = "✅" if status == "success" else "⚠️" if status == "partial" else "❌"
                  subject = f"{icon} YouTube scrape {date} — {n_vid:,} videos, {n_emb_chg:,} embed changes"

                  # today panel counts
                  today_counts = {}
                  for t in ["channels_daily", "videos_daily", "embeds_daily"]:
                      n = c.execute(f"SELECT COUNT(*) FROM {t} WHERE scrape_date = date('now')").fetchone()[0]
                      today_counts[t] = n

                  body = f"""Daily YouTube Embed Scrape — {date}

          Status: {status}
          Started: {started}
          Ended:   {ended}

          === Stage Stats ===
          Channels processed:    {n_ch} (failed: {n_ch_fail})
          Videos updated:        {n_vid:,}
          New videos:            {n_new:,}
          Embeds re-parsed:      {n_emb_re:,}
          Embed changes:         {n_emb_chg:,}
          API quota used:        {quota:,} / 10,000 ({quota/100:.1f}%)

          === Today panel rows ===
          channels_daily:        {today_counts['channels_daily']:,}
          videos_daily:          {today_counts['videos_daily']:,}
          embeds_daily:          {today_counts['embeds_daily']:,}

          === Run ===
          {run_url}
          """
                  if notes:
                      body += f"\nNotes: {notes}\n"

          # Write to GITHUB_ENV (multi-line via delimiter)
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"EMAIL_SUBJECT={subject}\n")
              f.write("EMAIL_BODY<<__BODY_EOF__\n")
              f.write(body)
              f.write("\n__BODY_EOF__\n")
          print(f"Subject: {subject}")
          print(f"Body:\n{body}")
          PYEOF

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ env.EMAIL_SUBJECT }}
          to: ${{ secrets.GMAIL_USER }}
          from: YouTube Scraper <${{ secrets.GMAIL_USER }}>
          body: ${{ env.EMAIL_BODY }}
